<!doctype html>
<html lang="en">
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap"
			rel="stylesheet"
		/>
    <link rel="stylesheet" href="./style.css">
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign up Form</title>
	</head>
	<body>
    <div class="flex-container">

      <section class="background-img-container">
        <div class="logo-container">
          <img src="./images/odin-logo.png" alt="Odin logo">
          <h2>Odin</h2>
        </div>
        <p>
          Photo by <a href="#">Hale West</a> on <a href="#">Unsplash</a>
        </p>
      </section>

      <section class="content-container">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Assumenda, aperiam optio ratione quisquam, error autem facilis necessitatibus iste.</p>
        <p>You know you want to.</p>

        <form action="#">

          <h2>Let's do this!</h2>

          <div class="form-grid">
            <div class="input-group">
              <label for="first-name">First Name</label>
              <input type="text" name="first-name" id="first-name">
            </div>

            <div class="input-group">
              <label for="last-name">Last Name</label>
              <input type="text" name="last-name" id="last-name">
            </div>

            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" name="email" id="email">
            </div>

            <div class="input-group">
              <label for="phone-number">Phone Number</label>
              <input type="tel" name="phone-number" id="phone-number">
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" name="pswd" id="password">
            </div>

            <div class="input-group">
              <label for="confirm-pswd">Confirm Password</label>
              <input type="password" name="confirm-pswd" id="confirm-pswd">
            </div>
          </div>

        </form>

        <button type="submit">Create Account</button>
        <p>Already have an account? <a class="login-link" href="#">Log in</a></p>
      </section>
    </div>
	</body>
</html>
